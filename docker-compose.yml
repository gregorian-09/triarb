services:
  ta-bot:
    build: .
    container_name: ta-bot
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - ./production.toml:/app/production.toml:ro
      - ./logs:/var/log/ta-bot
    environment:
      - RUST_LOG=info
      # For execution mode, mount a .env file or use AWS Secrets Manager:
      # - BINANCE_API_KEY=your_key
      # - BINANCE_SECRET_KEY=your_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: ta-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: ta-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
