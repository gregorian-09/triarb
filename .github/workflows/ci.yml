name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Live integration test (record + backtest)
        run: |
          cargo run --example record_ticks -- --duration 15 --output /tmp/ci_ticks.jsonl
          lines=$(wc -l < /tmp/ci_ticks.jsonl)
          echo "recorded ${lines} ticks"
          test "$lines" -gt 0 || { echo "no ticks recorded"; exit 1; }
          cargo run -- backtest \
            --config backtest.toml \
            --data /tmp/ci_ticks.jsonl \
            --output /tmp/ci_results.jsonl
          echo "backtest complete — $(wc -l < /tmp/ci_results.jsonl) trades found"
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
